services:
  # Configuração focada apenas no servidor, sem interface web
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: always
    networks:
      - dev-network
    user: "101:101"
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    deploy:
        mode: replicated
        replicas: 1
        placement:
          constraints:
            - node.role == manager
        resources:
          limits:
            cpus: "1"
            memory: 2048M

volumes:
  clickhouse_data:
  clickhouse_logs:

networks:
  dev-network:
    external: true