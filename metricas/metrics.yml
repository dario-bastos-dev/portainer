services:
  prometheus:
    image: prom/prometheus:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus_data:/prometheus
      - /root/portainer/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /root/portainer/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - dev-network
      - traefik-public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.prometheus.rule=Host(`prometheus.<SEU_DOMINIO>`)
        - traefik.http.routers.prometheus.entrypoints=websecure
        - traefik.http.routers.prometheus.service=prometheus
        - traefik.http.routers.prometheus.tls.certresolver=letsencrypt
        - traefik.http.services.prometheus.loadbalancer.server.port=9090
        - traefik.http.services.prometheus.loadbalancer.passHostHeader=true
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  grafana:
    image: grafana/grafana:latest-ubuntu # Use a versão mais recente do Grafana baseada em Ubuntu ou normal "latest"
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.<SEU_DOMINIO>
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - dev-network
      - traefik-public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.grafana.rule=Host(`grafana.<SEU_DOMINIO>`)
        - traefik.http.routers.grafana.entrypoints=websecure
        - traefik.http.routers.grafana.service=grafana
        - traefik.http.routers.grafana.tls.certresolver=letsencrypt
        - traefik.http.services.grafana.loadbalancer.server.port=3000
        - traefik.http.services.grafana.loadbalancer.passHostHeader=true
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # SERVIÇOS DE OBSERVABILIDADE

  node-exporter: # Exporta métricas de uso do hardware para o Prometheus
    image: prom/node-exporter:latest
    hostname: "{{.Node.Hostname}}"
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - dev-network
    deploy:
      mode: global
      resources:
        limits:
          memory: 128M

  cadvisor: # Exporta métricas de uso de contêineres para o Prometheus
    image: gcr.io/cadvisor/cadvisor:latest
    hostname: "{{.Node.Hostname}}"
    command:
      - '-port=8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - dev-network
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M

  alertmanager: # Gerencia alertas enviados pelo Prometheus
    image: prom/alertmanager:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - alertmanager_data:/alertmanager
      - /root/portainer/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - dev-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  dev-network:
    external: true
  traefik-public:
    external: true