global:
  resolve_timeout: 5m

route:
  receiver: 'alerta_servidor'
  group_by: ['alertname', 'instance']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: 'alerta_servidor'
    slack_configs:
      - api_url: '<WEBHOOK_URL>'
        channel: '#alertas-servidor'
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'