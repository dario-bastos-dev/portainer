x-shared-env: &dify-env
  REDIS_USE_SSL: 'false'
  MIGRATION_ENABLED: "true"
  DEPLOY_ENV: PRODUCTION
  SERVER_WORKER_AMOUNT: 3
  # Cookies Cross-Domain
  COOKIE_DOMAIN: "studiotriplea.com.br"
  NEXT_PUBLIC_COOKIE_DOMAIN: "1"
  # CORS
  WEB_API_CORS_ALLOW_ORIGINS: "*"
  CONSOLE_CORS_ALLOW_ORIGINS: "*"
  # Mail (SMTP)
  MAIL_TYPE: smtp
  MAIL_DEFAULT_SEND_FROM: ${MAIL_DEFAULT_SEND_FROM}
  SMTP_SERVER: ${SMTP_SERVER}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_USE_TLS: ${SMTP_USE_TLS}
  # URLs
  EDITION: SELF_HOSTED
  CONSOLE_WEB_URL: https://${CONSOLE_WEB_URL}
  CONSOLE_API_URL: https://${CONSOLE_API_URL}
  SERVICE_API_URL: https://${CONSOLE_API_URL}
  INTERNAL_API_URL: http://dify-api:5001
  TRIGGER_URL: https://${CONSOLE_API_URL}
  APP_API_URL: https://${API_URL}
  APP_WEB_URL: https://${APP_URL}
  # Plugin
  PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY}
  PLUGIN_DAEMON_URL: http://dify-plugin:5002
  # Files
  FILES_URL: https://${CONSOLE_API_URL}
  INTERNAL_FILES_URL: http://dify-api:5001
  # Linguagem e Localização
  LANG: pt_BR.UTF-8
  LC_ALL: pt_BR.UTF-8
  PYTHONIOENCODING: utf-8
  # Logs
  LOG_LEVEL: INFO
  LOG_OUTPUT_FORMAT: text
  LOG_FILE: /app/logs/server.log
  LOG_FILE_MAX_SIZE: 20
  LOG_FILE_BACKUP_COUNT: 5
  LOG_DATEFORMAT: "%Y-%m-%d %H:%M:%S"
  LOG_TZ: UTC
  # Database (Externo)
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_DATABASE: ${DB_DATABASE}
  # Redis (Interno)
  REDIS_HOST: dify-redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@dify-redis:6379/1
  # Vector Database (Qdrant Externo)
  VECTOR_STORE: qdrant
  QDRANT_URL: ${QDRANT_URL}
  QDRANT_API_KEY: ${QDRANT_API_KEY}
  # Storage (MinIO/S3 Externo)
  STORAGE_TYPE: s3
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_REGION: ${S3_REGION}
  # Security
  SECRET_KEY: ${SECRET_KEY}
  # Limits
  UPLOAD_FILE_SIZE_LIMIT: 20
  UPLOAD_FILE_BATCH_LIMIT: 5
  # Telemetry
  TELEMETRY_ENABLED: 'false'
  DO_NOT_TRACK: 'true'
  # Proxies Internos
  SSRF_PROXY_HTTP_URL: http://dify-ssrf_proxy:3128
  SSRF_PROXY_HTTPS_URL: http://dify-ssrf_proxy:3128
  

services:
  
  dify-api:
    image: langgenius/dify-api:latest
    environment:
      <<: *dify-env
      # Service
      MODE: api
    depends_on:
      - redis
      - dify-sandbox
      - dify-ssrf_proxy
    networks:
      - dev-network
      - traefik-public
    volumes:
      - dify-data:/app/api/storage
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dify-api.rule=Host(`${CONSOLE_API_URL}`)"
        - "traefik.http.routers.dify-api.entrypoints=websecure"
        - "traefik.http.routers.dify-api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.dify-api.service=dify-api"
        - "traefik.http.services.dify-api.loadbalancer.server.port=5001" 
        - "traefik.http.services.dify-api.loadbalancer.passHostHeader=true"
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 512M

  dify-worker:
    image: langgenius/dify-api:latest
    environment:
      <<: *dify-env
      MODE: worker
    depends_on:
      - redis
      - dify-sandbox
      - dify-ssrf_proxy
    networks:
      - dev-network
    volumes:
      - dify-data:/app/api/storage
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 1024M

  dify-worker_beat:
    image: langgenius/dify-api:latest
    environment:
      <<: *dify-env
      MODE: beat
    depends_on:
      - redis
    networks:
      - dev-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  dify-plugin:
    image: langgenius/dify-plugin-daemon:latest-local
    environment:
      <<: *dify-env 
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
    networks:
      - dev-network
      - traefik-public
    ports: 
      - "5003:5003"
    volumes:
      - plugin-data:/app/storage
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dify-plugin.rule=Host(`${PLUGIN_WEB_URL}`)"
        - "traefik.http.routers.dify-plugin.entrypoints=websecure"
        - "traefik.http.routers.dify-plugin.tls.certresolver=letsencrypt"
        - "traefik.http.routers.dify-plugin.service=dify-plugin"
        - "traefik.http.services.dify-plugin.loadbalancer.server.port=5002"
        - "traefik.http.services.dify-plugin.loadbalancer.passHostHeader=true"
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s

  dify-web:
    image: langgenius/dify-web:latest
    environment:
      <<: *dify-env
      NEXT_TELEMETRY_DISABLED: '1'
      HOSTNAME: 0.0.0.0
      PORT: 3000
    networks:
      - dev-network
      - traefik-public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dify-web.rule=Host(`${APP_URL}`) || Host(`${CONSOLE_WEB_URL}`)"
        - "traefik.http.routers.dify-web.entrypoints=websecure"
        - "traefik.http.routers.dify-web.tls.certresolver=letsencrypt"
        - "traefik.http.services.dify-web.loadbalancer.server.port=3000"
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.2"
          memory: 256M

  dify-redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data-dify:/data
    networks:
      - dev-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.2"
          memory: 256M

  dify-sandbox:
    image: langgenius/dify-sandbox:latest
    environment:
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: 'true'
      HTTP_PROXY: http://dify-ssrf_proxy:3128
      HTTPS_PROXY: http://dify-ssrf_proxy:3128
      SANDBOX_PORT: 8194
    networks:
      - dev-network
    volumes:
      - dify-sandbox_deps:/dependencies
      # - ./volumes/sandbox/conf:/conf
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.1"
          memory: 256M

  dify-ssrf_proxy:
    image: ubuntu/squid:latest
    environment:
      SSRF_PROXY_HTTP_PORT: 3128
    configs:
      - source: squid_config
        target: /etc/squid/squid.conf
    networks:
      - dev-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s

volumes:
  redis_data-dify:
  dify-data:
  plugin-data:
  dify-sandbox_deps:

networks:
  dev-network:
    external: true
  traefik-public:
    external: true

configs:
  squid_config:
    external: true 